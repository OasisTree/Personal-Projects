<!doctype html>
<html>
  <head>
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sono:wght,MONO@200..800,1&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <section class="display">
        <output id="result"></output>
      </section>
      <div class="operation button" value="+"><button>+</button></div>
      <div class="operation button" value="-"><button>-</button></div>
      <div class="operation button" value="×"><button>×</button></div>
      <div class="operation button" value="÷"><button>÷</button></div>
      <div class="number button" value="6"><button>6</button></div>
      <div class="number button" value="7"><button>7</button></div>
      <div class="number button" value="8"><button>8</button></div>
      <div class="number button" value="9"><button>9</button></div>
      <div class="number button" value="2"><button>2</button></div>
      <div class="number button" value="3"><button>3</button></div>
      <div class="number button" value="4"><button>4</button></div>
      <div class="number button" value="5"><button>5</button></div>
      <div class="number button" value="1"><button>1</button></div>
      <div class="number button" value="0"><button>0</button></div>
      <div class="number button" value="."><button>.</button></div>
      <div class="number button" id="clear" value="c"><button>C</button></div>
      <div class="number button" id="equals" value="="><button>=</button></div>
      <div class="number button" id="del" value="del"><button>DEL</button></div>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
