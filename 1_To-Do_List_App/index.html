<!doctype html>
<html>
  <head>
    <title>To-do List</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Sono:wght,MONO@200..800,1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <section class="header">
        <div class="title">Task Manager</div>
        <input
          type="text"
          class="task-input"
          placeholder="What needs to be done?"
        />
        <button class="btn">Add Task</button>
      </section>
      <section class="body">
        <p class="empty-message" style="display: none">
          You have no tasks yet.
        </p>
        <table class="task-table" style="">
          <thead>
            <tr>
              <th>Task Name</th>
              <th>Subject</th>
              <th>Duedate</th>
              <th>Type</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr></tr>
          </tbody>
        </table>
      </section>
    </div>
    <script src="./index.js"></script>
  </body>
</html>
